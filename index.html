<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela 2026 - Control Manual</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-100">
    <h1 class="text-2xl font-bold mb-4 text-center">Quiniela 2026</h1>
    
    <select id="userSelector" class="w-full p-2 mb-4 border rounded" onchange="cargarPartidos()">
        <option value="">Selecciona tu nombre...</option>
    </select>
    
    <div id="partidos" class="space-y-4">
        <p class="text-center">Selecciona un usuario para empezar.</p>
    </div>

    <script>
        const cliente = supabase.createClient(
            "https://wfskavugxwhtdeyqopzm.supabase.co", 
            "sb_publishable_dbe1TJq4ay0tylJGVZ2mKg_ljzOxigY"
        );

        async function cargarPartidos() {
            const u = document.getElementById('userSelector').value;
            if (!u) return;

            const { data: listaPartidos } = await cliente.from('partidos').select('*').order('fecha');
            const { data: pronos } = await cliente.from('pronosticos').select('*').eq('nombre_usuario', u);

            const container = document.getElementById('partidos');
            container.innerHTML = '';

            listaPartidos.forEach(m => {
                const p = pronos?.find(x => x.partido_id == m.id);
                container.innerHTML += `
                    <div class="bg-white p-3 rounded shadow flex items-center gap-2 text-sm">
                        <div class="w-1/4 font-bold text-xs text-blue-600">${m.fase}</div>
                        <span class="w-1/2">${m.nombre_local} vs ${m.nombre_visitante}</span>
                        <input id="l-${m.id}" type="number" value="${p?.pronostico_local ?? 0}" class="w-10 border text-center">
                        <input id="v-${m.id}" type="number" value="${p?.pronostico_visitante ?? 0}" class="w-10 border text-center">
                        <button onclick="guardar('${m.id}', '${m.nombre_local} vs ${m.nombre_visitante}')" class="bg-green-600 text-white px-2 py-1 rounded">OK</button>
                    </div>`;
            });
        }

        async function guardar(id, nombre) {
            const u = document.getElementById('userSelector').value;
            const { error } = await cliente.from('pronosticos').upsert({
                nombre_usuario: u,
                partido_id: id,
                pronostico_local: parseInt(document.getElementById(`l-${id}`).value),
                pronostico_visitante: parseInt(document.getElementById(`v-${id}`).value),
                partido_nombre: nombre
            });
            if (error) alert("Error: " + error.message);
            else alert("¡Guardado!");
        }

        async function init() {
            const { data } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            data?.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
        }

        init();
    </script>
</body>
</html>
