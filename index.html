<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-100">
    <h1 class="text-2xl font-bold mb-4 text-center">Quiniela 2026</h1>
    
    <select id="userSelector" class="w-full p-2 mb-4 border rounded" onchange="cargarPartidos()">
        <option value="">Selecciona tu nombre...</option>
    </select>
    
    <div id="partidos" class="bg-white p-4 rounded shadow">
        <p class="text-gray-500 text-center">Selecciona un usuario para cargar los partidos...</p>
    </div>

    <script>
        const cliente = supabase.createClient(
            "https://wfskavugxwhtdeyqopzm.supabase.co", 
            "sb_publishable_dbe1TJq4ay0tylJGVZ2mKg_ljzOxigY"
        );

        const API_KEY = '8bd17a06ad9c42b8940faa3869f2ed55';

        async function init() {
            const { data } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            if (data) {
                data.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
            }
        }

        async function cargarPartidos() {
            const u = document.getElementById('userSelector').value;
            if (!u) return;

            // ✅ Usamos corsproxy.io, que permite pasar el token como parámetro
            const targetUrl = 'https://api.football-data.org/v4/competitions/WC/matches';
            const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}&x-auth-token=${API_KEY}`;
            
            try {
                // Ya no enviamos cabeceras, solo una petición GET normal
                const response = await fetch(proxyUrl);
                const data = await response.json(); // La respuesta ya es el JSON de la API
                
                const { data: pronos } = await cliente.from('pronosticos').select('*').eq('nombre_usuario', u);

                document.getElementById('partidos').innerHTML = data.matches.slice(0, 10).map(m => {
                    const p = pronos?.find(x => x.partido_id == m.id);
                    return `
                        <div class="flex items-center gap-2 p-3 border-b text-sm">
                            <span class="w-1/2">${m.homeTeam.name} vs ${m.awayTeam.name}</span>
                            <input id="l-${m.id}" type="number" value="${p?.pronostico_local ?? 0}" class="w-10 border text-center">
                            <input id="v-${m.id}" type="number" value="${p?.pronostico_visitante ?? 0}" class="w-10 border text-center">
                            <button onclick="guardar('${m.id}', '${m.homeTeam.name} vs ${m.awayTeam.name}')" class="bg-blue-600 text-white px-2 py-1 rounded">OK</button>
                        </div>`;
                }).join('');
            } catch (error) {
                console.error("Error cargando partidos:", error);
                document.getElementById('partidos').innerHTML = "<p class='text-red-500'>Error al cargar partidos. Intenta de nuevo.</p>";
            }
        }

        async function guardar(id, nombrePartido) {
            const u = document.getElementById('userSelector').value;
            const l = document.getElementById(`l-${id}`).value;
            const v = document.getElementById(`v-${id}`).value;
            
            const { error } = await cliente.from('pronosticos').upsert({
                nombre_usuario: u,
                partido_id: id.toString(),
                pronostico_local: parseInt(l),
                pronostico_visitante: parseInt(v),
                partido_nombre: nombrePartido
            });
            
            if (error) {
                alert("Error al guardar: " + error.message);
            } else {
                alert("¡Pronóstico guardado exitosamente!");
            }
        }

        init();
    </script>
</body>
</html>
