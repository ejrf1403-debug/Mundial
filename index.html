<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-100">
    <h1 class="text-2xl font-bold mb-4 text-center">Quiniela 2026</h1>
    
    <select id="userSelector" class="w-full p-2 mb-4 border rounded" onchange="cargar()">
        <option value="">Selecciona tu nombre...</option>
    </select>
    
    <div id="partidos" class="bg-white p-4 rounded shadow">
        <p class="text-gray-500 text-center">Selecciona un usuario para ver los partidos</p>
    </div>

    <script>
        const cliente = supabase.createClient(
            "https://wfskavugxwhtdeyqopzm.supabase.co", 
            "sb_publishable_dbe1TJq4ay0tylJGVZ2mKg_ljzOxigY"
        );

        async function init() {
            const { data, error } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            if (data) {
                data.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
            }
        }

        async function cargar() {
            const u = document.getElementById('userSelector').value;
            if (!u) return;

            const partidos = [
                { id: "1", home: "España", away: "Cabo Verde" },
                { id: "2", home: "Brasil", away: "Argentina" },
                { id: "3", home: "Francia", away: "Alemania" }
            ];
            
            const { data: pronos } = await cliente.from('pronosticos').select('*').eq('nombre_usuario', u);
            
            document.getElementById('partidos').innerHTML = partidos.map(m => {
                const p = pronos?.find(x => x.partido_id == m.id);
                return `
                    <div class="flex items-center gap-2 p-3 border-b">
                        <span class="text-sm w-1/2 font-medium">${m.home} vs ${m.away}</span>
                        <input id="l-${m.id}" type="number" value="${p?.pronostico_local ?? 0}" class="w-12 border text-center rounded">
                        <input id="v-${m.id}" type="number" value="${p?.pronostico_visitante ?? 0}" class="w-12 border text-center rounded">
                        <button onclick="guardar('${m.id}')" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">OK</button>
                    </div>`;
            }).join('');
        }

        async function guardar(id) {
            const u = document.getElementById('userSelector').value;
            const l = document.getElementById(`l-${id}`).value;
            const v = document.getElementById(`v-${id}`).value;
            
            const payload = {
                nombre_usuario: u,
                partido_id: id,
                pronostico_local: parseInt(l) || 0,
                pronostico_visitante: parseInt(v) || 0
            };

            const { error } = await cliente.from('pronosticos').upsert(payload);
            
            if (error) {
                console.error("Error al guardar:", error);
                alert("Error al guardar: " + error.message);
            } else {
                alert("¡Pronóstico guardado exitosamente!");
            }
        }

        init();
    </script>
</body>
</html>
