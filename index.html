<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-4">Quiniela 2026</h1>
        <select id="userSelector" class="w-full p-3 border rounded-lg mb-4 font-bold">
            <option value="">Selecciona tu nombre...</option>
        </select>
        <div id="partidos" class="space-y-2"></div>
    </div>

    <script>
        // Credenciales actualizadas para el proyecto Quiniela_Final
        const cliente = supabase.createClient(
            "https://wfskavugxwhtdeyqopzm.supabase.co", 
            "sb_publishable_dbe1TJq4ay0tylJGVZ2mKg_ljzOxigY"
        );

        async function init() {
            const { data } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            data.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
            sel.onchange = cargar;
        }

        async function cargar() {
            const u = document.getElementById('userSelector').value;
            // Usamos la URL de tu proyecto actual
            const res = await fetch('https://wfskavugxwhtdeyqopzm.supabase.co/functions/v1/football-data-import');
            const data = await res.json();
            const pronos = await cliente.from('pronosticos').select('*').eq('nombre_usuario', u);
            
            document.getElementById('partidos').innerHTML = data.matches.map(m => {
                const p = pronos.data.find(x => x.partido_id == m.id);
                return `<div class="flex items-center gap-2 p-2 border-b">
                    <span class="text-sm w-1/2 truncate">${m.homeTeam.name} vs ${m.awayTeam.name}</span>
                    <input id="l-${m.id}" value="${p?.pronostico_local ?? 0}" class="w-10 border text-center">
                    <input id="v-${m.id}" value="${p?.pronostico_visitante ?? 0}" class="w-10 border text-center">
                    <button onclick="guardar('${m.id}')" class="bg-blue-600 text-white px-2 py-1 rounded">OK</button>
                </div>`;
            }).join('');
        }

        async function guardar(id) {
            const u = document.getElementById('userSelector').value;
            const l = parseInt(document.getElementById('l-'+id).value);
            const v = parseInt(document.getElementById('v-'+id).value);
            
            const { error } = await cliente.from('pronosticos').upsert({
                nombre_usuario: u, partido_id: String(id), pronostico_local: l, pronostico_visitante: v
            }, { onConflict: 'nombre_usuario, partido_id' });

            if(!error) alert("¡Guardado!");
            else alert("Error: " + error.message);
        }
        init();
    </script>
</body>
</html>
