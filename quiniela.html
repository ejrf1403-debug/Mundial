<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-xl font-bold mb-4">Quiniela Mundial 2026</h1>
        <button id="btnSync" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold">
            🚀 Cargar Partidos
        </button>
        <div id="status" class="mt-4 text-slate-700"></div>
    </div>

    <script>
        // Inicialización única
        const cliente = supabase.createClient(
            "https://vaayxjpzwhesukyzmnez.supabase.co", 
            "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm"
        );

        async function sincronizarPartidos() {
            const status = document.getElementById('status');
            status.innerHTML = "⏳ Conectando con servidor y cargando partidos...";

            try {
                // Llamada a tu Edge Function
                const res = await fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import');
                
                if (!res.ok) throw new Error("Error en servidor: " + res.status);
                
                const data = await res.json();
                
                // Mostrar resultados en una lista
                let html = '<h2 class="font-bold mt-4 mb-2">Próximos partidos:</h2><ul class="space-y-2">';
                data.matches.slice(0, 10).forEach(m => {
                    html += `
                        <li class="bg-slate-50 p-3 rounded border">
                            <span class="font-semibold">${m.homeTeam.name}</span> 
                            <span class="text-slate-500">vs</span> 
                            <span class="font-semibold">${m.awayTeam.name}</span>
                            <br><small class="text-xs text-blue-600">${new Date(m.utcDate).toLocaleString()}</small>
                        </li>`;
                });
                html += '</ul>';
                
                status.innerHTML = "✅ ¡Sincronización exitosa!<br>" + html;
                
            } catch (e) {
                status.innerText = "❌ Error: " + e.message;
                console.error(e);
            }
        }

        document.getElementById('btnSync').addEventListener('click', sincronizarPartidos);
    </script>
</body>
</html>
