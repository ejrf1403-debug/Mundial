<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-2 text-sm">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2 space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <h1 class="text-xl font-bold mb-4 text-center">🏆 Quiniela 2026</h1>
                <select id="userSelector" class="w-full p-2 border rounded-lg mb-2 font-bold text-red-600 bg-red-50">
                    <option value="">Cargando participantes...</option>
                </select>
            </div>
            <div id="status" class="bg-white p-4 rounded-xl shadow">Cargando partidos...</div>
        </div>
        <div class="md:col-span-1">
            <div class="bg-white p-4 rounded-xl shadow sticky top-4">
                <h2 class="text-lg font-bold mb-2">📊 Tabla</h2>
                <div id="tablaContenido" class="space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        async function init() {
            const sel = document.getElementById('userSelector');
            const { data } = await cliente.from('usuarios').select('nombre');
            sel.innerHTML = '<option value="">Selecciona un participante...</option>';
            data?.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
            const u = new URLSearchParams(window.location.search).get('usuario');
            if (u) { sel.value = u; cargarTodo(); }
            sel.onchange = cargarTodo;
        }

        async function cargarTodo() {
            const status = document.getElementById('status');
            const usuarioSeleccionado = document.getElementById('userSelector').value;
            const nombreVisitante = new URLSearchParams(window.location.search).get('usuario');
            
            const [res, pData] = await Promise.all([
                fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import'),
                cliente.from('pronosticos').select('*')
            ]);
            
            const { matches } = await res.json();
            const pronosticos = pData.data;
            const ahoraMS = Date.now();

            status.innerHTML = matches.map(m => {
                const p = pronosticos?.find(x => x.partido_id == m.id && x.nombre_usuario == usuarioSeleccionado);
                const fechaMS = new Date(m.utcDate).getTime();
                
                // Debug log para ver qué está pasando
                // console.log(`Partido: ${m.homeTeam.name}, Fecha: ${m.utcDate}, Bloqueado: ${(fechaMS - 1800000) <= ahoraMS}`);

                const esAdmin = (nombreVisitante === 'Emmanuel');
                const esPropio = (usuarioSeleccionado === nombreVisitante);
                
                // Reglas simplificadas para evitar bloqueos innecesarios
                const esFuturo = fechaMS > ahoraMS;
                const estaProgramado = (m.status === 'SCHEDULED');
                const faltaMucho = (fechaMS - 1800000) > ahoraMS;

                // Acceso: Admin siempre, Usuario si es su perfil, es futuro y no está a menos de 30 min
                const puedeEditar = esAdmin || (esPropio && estaProgramado && faltaMucho);

                return `<div class="border-b py-2">
                    <div class="flex items-center justify-between gap-2">
                        <span class="w-1/2 text-xs font-medium">${m.homeTeam?.name || 'Local'} vs ${m.awayTeam?.name || 'Visita'}</span>
                        <input type="number" id="l-${m.id}" value="${p?.pronostico_local ?? ''}" class="w-10 border text-center rounded" ${puedeEditar ? '' : 'disabled'}>
                        <input type="number" id="v-${m.id}" value="${p?.pronostico_visitante ?? ''}" class="w-10 border text-center rounded" ${puedeEditar ? '' : 'disabled'}>
                        <button onclick="guardar('${m.id}')" class="bg-green-600 text-white px-2 py-1 rounded text-xs ${puedeEditar ? '' : 'hidden'}">OK</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function guardar(id) {
            const usuario = document.getElementById('userSelector').value;
            await cliente.from('pronosticos').upsert({
                nombre_usuario: usuario, partido_id: String(id),
                pronostico_local: parseInt(document.getElementById('l-'+id).value),
                pronostico_visitante: parseInt(document.getElementById('v-'+id).value)
            }, { onConflict: 'nombre_usuario, partido_id' });
            alert("Guardado"); cargarTodo();
        }
        init();
    </script>
</body>
</html>
