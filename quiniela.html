<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-xl font-bold mb-4">Quiniela Mundial 2026</h1>
        
        <button id="btnSync" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-lg font-bold transition">
            🚀 Cargar Partidos
        </button>
        
        <div id="status" class="mt-6 text-slate-800">
            </div>
    </div>

    <script>
        // Inicialización del cliente Supabase
        const cliente = supabase.createClient(
            "https://vaayxjpzwhesukyzmnez.supabase.co", 
            "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm"
        );

        async function sincronizarPartidos() {
            const status = document.getElementById('status');
            status.innerHTML = '<p class="text-blue-600 font-mono italic">⏳ Conectando con servidor...</p>';

            try {
                const res = await fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import');
                
                if (!res.ok) throw new Error("Error en servidor: " + res.status);
                
                const data = await res.json();
                
                // Construcción visual de la lista
                let html = '<div class="space-y-3">';
                html += '<h2 class="font-bold text-lg text-green-600">✅ ¡Sincronización exitosa!</h2>';
                
                if (data.matches && data.matches.length > 0) {
                    data.matches.slice(0, 10).forEach(m => {
                        html += `
                            <div class="p-4 bg-white border border-slate-200 rounded-lg shadow-sm flex justify-between items-center">
                                <div>
                                    <p class="font-bold text-slate-800">${m.homeTeam.name} vs ${m.awayTeam.name}</p>
                                    <p class="text-xs text-slate-400">${new Date(m.utcDate).toLocaleString()}</p>
                                </div>
                                <span class="text-xs font-bold bg-slate-100 px-2 py-1 rounded">${m.status}</span>
                            </div>`;
                    });
                } else {
                    html += '<p>No se encontraron partidos disponibles.</p>';
                }
                html += '</div>';
                
                status.innerHTML = html;
                
            } catch (e) {
                status.innerHTML = '<p class="text-red-600 font-bold">❌ Error: ' + e.message + '</p>';
                console.error("Detalle del error:", e);
            }
        }

        document.getElementById('btnSync').addEventListener('click', sincronizarPartidos);
    </script>
</body>
</html>
