<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-2xl font-bold text-center mb-6">🏆 Quiniela Mundial 2026</h1>
        
        <div class="bg-blue-50 p-4 rounded-lg mb-6 border-l-4 border-blue-600">
            <p class="text-blue-800 font-bold">Sesión activa como: <span id="nombreUser">Emmanuel</span></p>
        </div>
        
        <button id="btnLoad" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Cargar Partidos</button>
        <div id="status" class="mt-8"></div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        async function guardarPronostico(partidoId, horaPartido, inputL, inputV) {
            const nombre = "Emmanuel"; // Nombre forzado para el Administrador

            // Lógica de fuerza bruta para Admin
            console.log("Guardando como:", nombre);

            const { error } = await cliente.from('pronosticos').upsert({
                nombre_usuario: nombre,
                partido_id: String(partidoId),
                pronostico_local: parseInt(inputL.value) || 0,
                pronostico_visitante: parseInt(inputV.value) || 0
            }, { onConflict: 'nombre_usuario, partido_id' });

            if (error) {
                alert("❌ Error: " + error.message);
                console.error(error);
            } else {
                alert("✅ Pronóstico guardado exitosamente!");
            }
        }

        document.getElementById('btnLoad').addEventListener('click', async () => {
            const res = await fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import');
            const data = await res.json();
            let html = '<div class="space-y-4">';
            
            data.matches.forEach(m => {
                html += `
                    <div class="border p-3 rounded flex justify-between items-center bg-white shadow-sm">
                        <div class="text-xs">
                            <p class="font-bold">${m.homeTeam.name} vs ${m.awayTeam.name}</p>
                            <p class="text-gray-400">${new Date(m.utcDate).toLocaleDateString()}</p>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="l-${m.id}" class="w-10 border p-1 rounded" placeholder="0">
                            <input type="number" id="v-${m.id}" class="w-10 border p-1 rounded" placeholder="0">
                            <button onclick="guardarPronostico('${m.id}', '${m.utcDate}', document.getElementById('l-${m.id}'), document.getElementById('v-${m.id}'))" 
                            class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold">Guardar</button>
                        </div>
                    </div>`;
            });
            document.getElementById('status').innerHTML = html + '</div>';
        });
    </script>
</body>
</html>
