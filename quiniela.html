<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundial 2026</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Mi Quiniela Mundial 2026</h1>
    
    <button id="btnSync">Sincronizar Partidos</button>
    <p id="status"></p>

    <script>
        // 1. Inicialización ÚNICA: Solo una vez aquí
        const supabase = supabase.createClient(
            "https://vaayxjpzwhesukyzmnez.supabase.co", 
            "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm"
        );

        // 2. Función lógica
        async function iniciarSincronizacion() {
            const status = document.getElementById('status');
            status.innerText = "⏳ Conectando...";

            try {
                // AQUÍ iría tu código de fetch y supabase.from('partidos').insert(...)
                // Ejemplo rápido:
                const { data, error } = await supabase.from('partidos').select('*');
                status.innerText = "✅ ¡Sincronizado correctamente!";
            } catch (error) {
                status.innerText = "❌ Error: " + error.message;
            }
        }

        // 3. Conexión segura al botón
        document.getElementById('btnSync').addEventListener('click', iniciarSincronizacion);
    </script>
</body>
</html>
