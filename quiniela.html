<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-2xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-xl shadow">
            <h1 class="text-xl font-bold mb-4 text-center">🛠 Panel de Administración</h1>
            <select id="userSelector" onchange="cargarPronosticos()" class="w-full p-3 border rounded-lg mb-4 font-bold text-red-600 bg-red-50">
                <option value="">Selecciona un participante...</option>
            </select>
            <button id="btnLoad" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Cargar Partidos y Calcular</button>
            <div id="status" class="mt-4"></div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-xl font-bold mb-4 text-center">📊 Tabla de Posiciones</h2>
            <div id="leaderboard" class="space-y-2">Cargando...</div>
        </div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        async function cargarUsuarios() {
            const { data } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            data?.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
        }

        async function cargarPronosticos() {
            const nombre = document.getElementById('userSelector').value;
            if (!nombre) return;
            document.querySelectorAll('input[type="number"]').forEach(i => i.value = "");
            const { data } = await cliente.from('pronosticos').select('*').eq('nombre_usuario', nombre);
            data?.forEach(p => {
                const iL = document.getElementById(`l-${p.partido_id}`);
                const iV = document.getElementById(`v-${p.partido_id}`);
                if(iL) iL.value = p.pronostico_local;
                if(iV) iV.value = p.pronostico_visitante;
            });
        }

        async function guardarPronostico(partidoId, inputL, inputV) {
            const nombre = document.getElementById('userSelector').value;
            if (!nombre) { alert("¡Selecciona participante!"); return; }
            await cliente.from('pronosticos').upsert({
                nombre_usuario: nombre,
                partido_id: String(partidoId),
                pronostico_local: parseInt(inputL.value) || 0,
                pronostico_visitante: parseInt(inputV.value) || 0
            }, { onConflict: 'nombre_usuario, partido_id' });
            alert("✅ Guardado");
            calcularPosiciones();
        }

        async function calcularPosiciones() {
            const lb = document.getElementById('leaderboard');
            const res = await fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import');
            const dataRes = await res.json();
            const { data: pronosticos } = await cliente.from('pronosticos').select('*');
            
            if (!pronosticos || pronosticos.length === 0) { lb.innerHTML = "No hay pronósticos."; return; }

            let scores = {};
            pronosticos.forEach(p => {
                const partidoReal = dataRes.matches.find(m => m.id == p.partido_id);
                if (!partidoReal || partidoReal.status !== 'FINISHED') return;

                if (!scores[p.nombre_usuario]) scores[p.nombre_usuario] = 0;

                const realL = partidoReal.score.fullTime.home;
                const realV = partidoReal.score.fullTime.away;

                if (p.pronostico_local === realL && p.pronostico_visitante === realV) scores[p.nombre_usuario] += 3;
                else if ((p.pronostico_local > p.pronostico_visitante && realL > realV) || 
                         (p.pronostico_local < p.pronostico_visitante && realL < realV) ||
                         (p.pronostico_local === p.pronostico_visitante && realL === realV)) scores[p.nombre_usuario] += 1;
            });

            if (Object.keys(scores).length === 0) {
                lb.innerHTML = "Aún no hay resultados de partidos finalizados.";
            } else {
                lb.innerHTML = Object.entries(scores)
                    .sort((a, b) => b[1] - a[1])
                    .map(([nombre, pts]) => `
                        <div class="flex justify-between p-3 bg-gray-50 border rounded">
                            <span class="font-bold">${nombre}</span>
                            <span class="bg-blue-600 text-white px-3 rounded-full text-xs font-bold">${pts} pts</span>
                        </div>`).join('');
            }
        }

        document.getElementById('btnLoad').addEventListener('click', async () => {
            const res = await fetch('https://vaayxjpzwhesukyzmnez.svc.football-data-import');
            const data = await res.json();
            let html = '<div class="space-y-2">';
            data.matches.forEach(m => {
                html += `
                    <div class="flex items-center justify-between p-2 border-b text-xs">
                        <span class="w-1/2 truncate font-semibold">${m.homeTeam.name} vs ${m.awayTeam.name}</span>
                        <div class="flex gap-1">
                            <input type="number" id="l-${m.id}" class="w-10 border text-center p-1 rounded" placeholder="L">
                            <input type="number" id="v-${m.id}" class="w-10 border text-center p-1 rounded" placeholder="V">
                            <button onclick="guardarPronostico('${m.id}', document.getElementById('l-${m.id}'), document.getElementById('v-${m.id}'))" 
                            class="bg-green-600 text-white px-2 py-1 rounded font-bold">OK</button>
                        </div>
                    </div>`;
            });
            document.getElementById('status').innerHTML = html + '</div>';
            calcularPosiciones();
        });

        cargarUsuarios();
    </script>
</body>
</html>
