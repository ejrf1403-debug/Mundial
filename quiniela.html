<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-2 md:p-4">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2 space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <h1 class="text-lg font-bold mb-4 text-center">🏆 Quiniela 2026</h1>
                <select id="userSelector" class="w-full p-2 border rounded-lg mb-4 font-bold text-red-600 bg-red-50">
                    <option value="">Selecciona un participante...</option>
                </select>
                <button id="btnLoad" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Cargar Partidos</button>
                <div id="status" class="mt-4 space-y-1"></div>
            </div>
        </div>
        <div class="md:col-span-1">
            <div class="bg-white p-4 rounded-xl shadow md:sticky md:top-6 max-h-[50vh] md:max-h-[80vh] flex flex-col">
                <h2 class="text-lg font-bold mb-2 text-center">📊 Tabla</h2>
                <div id="leaderboard" class="space-y-1 text-sm overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        async function init() {
            const { data } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            data?.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
            const userParam = new URLSearchParams(window.location.search).get('usuario');
            if (userParam) { sel.value = userParam; await cargarTodo(); }
        }

        async function cargarTodo() {
            const status = document.getElementById('status');
            const lb = document.getElementById('leaderboard');
            const nombre = document.getElementById('userSelector').value;
            if (!nombre) return;
            
            const [res, {data: pronosticos}] = await Promise.all([
                fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import'),
                cliente.from('pronosticos').select('*')
            ]);
            const dataPartidos = await res.json();
            
            const ahora = Date.now();
            const esEmmanuel = (new URLSearchParams(window.location.search).get('usuario') === 'Emmanuel');
            const esDueno = (new URLSearchParams(window.location.search).get('usuario') === nombre);

            status.innerHTML = dataPartidos.matches.map(m => {
                const p = pronosticos?.find(x => x.partido_id == m.id && x.nombre_usuario == nombre);
                const fecha = new Date(m.utcDate).getTime();
                
                let color = '';
                if (m.status === 'FINISHED' && p) {
                    const rL = m.score.fullTime.home, rV = m.score.fullTime.away;
                    const pL = parseInt(p.pronostico_local), pV = parseInt(p.pronostico_visitante);
                    if (pL === rL && pV === rV) color = 'bg-green-300';
                    else if ((pL > pV && rL > rV) || (pL < pV && rL < rV) || (pL === pV && rL === rV)) color = 'bg-yellow-300';
                    else color = 'bg-red-300';
                }

                const bloqueado = esEmmanuel ? '' : (ahora >= fecha || !esDueno ? 'disabled' : '');
                const hide = esEmmanuel ? '' : (ahora >= fecha || !esDueno ? 'hidden' : '');

                return `<div class="flex items-center justify-between p-2 border-b text-xs gap-1">
                    <span class="w-1/2 truncate">${m.homeTeam.name.substring(0, 10)}...</span>
                    <input type="number" value="${p?.pronostico_local ?? ''}" id="l-${m.id}" class="w-8 border text-center rounded ${color}" ${bloqueado}>
                    <input type="number" value="${p?.pronostico_visitante ?? ''}" id="v-${m.id}" class="w-8 border text-center rounded ${color}" ${bloqueado}>
                    <button onclick="guardar('${m.id}')" class="bg-green-600 text-white px-2 py-1 rounded ${hide}">OK</button>
                </div>`;
            }).join('');

            let scores = {};
            dataPartidos.matches.forEach(m => {
                if (m.status === 'FINISHED') {
                    pronosticos?.forEach(p => {
                        if (p.partido_id == m.id) {
                            if (!scores[p.nombre_usuario]) scores[p.nombre_usuario] = 0;
                            const rL = m.score.fullTime.home, rV = m.score.fullTime.away;
                            const pL = parseInt(p.pronostico_local), pV = parseInt(p.pronostico_visitante);
                            if (pL === rL && pV === rV) scores[p.nombre_usuario] += 3;
                            else if ((pL > pV && rL > rV) || (pL < pV && rL < rV) || (pL === pV && rL === rV)) scores[p.nombre_usuario] += 1;
                        }
                    });
                }
            });
            lb.innerHTML = Object.entries(scores).sort((a,b) => b[1]-a[1]).map(([n, s], i) => 
                `<div class="flex justify-between items-center p-2 ${i==0?'bg-yellow-400':i==1?'bg-gray-300':i==2?'bg-amber-600 text-white':''} border rounded">
                    <span>${i+1}. ${n}</span><b>${s} pts</b>
                </div>`).join('');
        }

        async function guardar(id) {
            const nombre = document.getElementById('userSelector').value;
            await cliente.from('pronosticos').upsert({
                nombre_usuario: nombre, partido_id: String(id),
                pronostico_local: parseInt(document.getElementById('l-'+id).value),
                pronostico_visitante: parseInt(document.getElementById('v-'+id).value)
            }, { onConflict: 'nombre_usuario, partido_id' });
            alert("Guardado");
            cargarTodo();
        }

        document.getElementById('btnLoad').onclick = cargarTodo;
        init();
    </script>
</body>
</html>
