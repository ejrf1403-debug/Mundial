<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-2xl font-bold mb-6 text-slate-800 text-center">🏆 Quiniela Mundial 2026</h1>
        
        <button id="btnSync" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-lg font-bold transition shadow-md">
            🚀 Sincronizar Datos
        </button>
        
        <div id="status" class="mt-8">
            <p class="text-center text-slate-500">Presiona el botón para cargar la información.</p>
        </div>
    </div>

    <script>
        // Inicialización de Supabase
        const cliente = supabase.createClient(
            "https://vaayxjpzwhesukyzmnez.supabase.co", 
            "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm"
        );

        async function sincronizarPartidos() {
            const status = document.getElementById('status');
            status.innerHTML = '<p class="text-center italic text-slate-500">⏳ Conectando con servidor y BD...</p>';

            try {
                // 1. Obtener Partidos (API) y usuarios (Tabla 'usuarios') en paralelo
                const [resApi, resDb] = await Promise.all([
                    fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import'),
                    cliente.from('usuarios').select('nombre') 
                ]);

                const dataPartidos = await resApi.json();
                const { data: listaUsuarios, error } = resDb;

                if (error) throw new Error("Error en BD: " + error.message);

                // 2. Construcción del HTML
                let html = '<div class="space-y-8">';
                
                // Sección Participantes
                html += `<div>
                    <h2 class="font-bold text-lg text-slate-800 border-b pb-2">👥 Participantes (${listaUsuario?.length || 0})</h2>
                    <div class="flex flex-wrap gap-2 mt-3">
                        ${listaUsuario?.map(p => `<span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">${p.nombre}</span>`).join('')}
                    </div>
                </div>`;

                // Sección Partidos
                html += '<div><h2 class="font-bold text-lg text-green-600 border-b pb-2 mb-4">⚽ Partidos Recientes</h2>';
                dataPartidos.matches?.slice(0, 8).forEach(m => {
                    const homeScore = m.score?.fullTime?.home ?? "-";
                    const awayScore = m.score?.fullTime?.away ?? "-";
                    const isFinished = m.status === 'FINISHED';
                    
                    html += `
                        <div class="p-3 bg-slate-50 border border-slate-100 rounded-lg flex justify-between items-center mb-2">
                            <div class="w-2/3">
                                <p class="font-bold text-sm text-slate-700">${m.homeTeam.name} vs ${m.awayTeam.name}</p>
                                <p class="text-[10px] text-slate-400">${new Date(m.utcDate).toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-blue-600">${homeScore} - ${awayScore}</p>
                                <span class="text-[9px] uppercase ${isFinished ? 'text-slate-400' : 'text-green-600 font-bold'}">${m.status}</span>
                            </div>
                        </div>`;
                });
                html += '</div></div>';
                
                status.innerHTML = html;
                
            } catch (e) {
                status.innerHTML = `<p class="text-red-600 font-bold text-center">❌ ${e.message}</p>`;
                console.error("Error completo:", e);
            }
        }

        document.getElementById('btnSync').addEventListener('click', sincronizarPartidos);
    </script>
</body>
</html>
