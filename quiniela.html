<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Quiniela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <button id="btnSync" onclick="sincronizar()" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold">
            🔄 Sincronizar Partidos
        </button>
        <p id="status" class="mt-4 text-center"></p>
    </div>

    <script>
        const supabase = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");
        const API_KEY = "8bd17a06ad9c42b8940faa3869f2ed55";

        async function sincronizar() {
            const status = document.getElementById('status');
            status.innerText = "⏳ Conectando...";
            try {
                const res = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://api.football-data.org/v4/competitions/WC/matches'), {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const data = await res.json();
                
                for (const m of data.matches) {
                    // AQUÍ ESTÁ LA CORRECCIÓN: usamos los nombres exactos de tu tabla
                    await supabase.from('partidos').insert([{ 
                        equipo_local: m.homeTeam.name,
                        equipo_visitante: m.awayTeam.name,
                        goles_local: m.score.fullTime.home,
                        goles_visitante: m.score.fullTime.away
                    }]);
                }
                status.innerText = "✅ ¡Sincronizado!";
            } catch (e) {
                status.innerText = "❌ Error: " + e.message;
            }
        }
    </script>
</body>
</html>
