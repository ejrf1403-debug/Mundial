<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-xl font-bold mb-4">Sincronización de Datos</h1>
        <button id="btnSync" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold">
            🚀 Sincronizar Partidos
        </button>
        <p id="status" class="mt-4 text-center font-mono text-sm text-slate-600"></p>
    </div>

    <script>
        // Inicialización del cliente de Supabase
        const cliente = supabase.createClient(
            "https://vaayxjpzwhesukyzmnez.supabase.co", 
            "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm"
        );

        async function sincronizarPartidos() {
            const status = document.getElementById('status');
            status.innerText = "⏳ Conectando con Supabase...";

            try {
                // Llamada a la función con el nombre correcto: football-data-import
                const res = await fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import');
                
                if (!res.ok) {
                    throw new Error("Error en servidor: " + res.status);
                }
                
                const data = await res.json();
                status.innerText = "✅ ¡Sincronización exitosa!";
                console.log("Datos recibidos:", data);
                
            } catch (e) {
                status.innerText = "❌ Error: " + e.message;
                console.error(e);
            }
        }

        document.getElementById('btnSync').addEventListener('click', sincronizarPartidos);
    </script>
</body>
</html>
