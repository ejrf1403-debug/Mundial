<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-2 text-sm">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2 space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <h1 class="text-xl font-bold mb-4 text-center">🏆 Quiniela 2026</h1>
                <select id="userSelector" class="w-full p-2 border rounded-lg mb-2 font-bold text-red-600 bg-red-50">
                    <option value="">Selecciona tu nombre...</option>
                </select>
            </div>
            <div id="status" class="bg-white p-4 rounded-xl shadow">Selecciona un usuario...</div>
        </div>
        <div class="md:col-span-1">
            <div class="bg-white p-4 rounded-xl shadow sticky top-4">
                <h2 class="text-lg font-bold mb-2">📊 Tabla de Posiciones</h2>
                <div id="tablaContenido" class="space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");
        let cachedMatches = null;

        async function init() {
            const sel = document.getElementById('userSelector');
            const { data } = await cliente.from('usuarios').select('nombre');
            
            // Filtramos nombres únicos para evitar duplicados en el selector
            const nombresUnicos = [...new Set(data.map(u => u.nombre.trim()))];
            nombresUnicos.forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
            
            const params = new URLSearchParams(window.location.search);
            if (params.has('usuario')) {
                sel.value = params.get('usuario');
                cargarTodo();
            }
            sel.onchange = () => {
                const url = new URL(window.location);
                url.searchParams.set('usuario', sel.value);
                window.history.pushState({}, '', url);
                cargarTodo();
            };
        }

        async function cargarTodo() {
            const status = document.getElementById('status');
            const u = document.getElementById('userSelector').value;
            if(!u) return;

            status.innerHTML = "Cargando...";

            const [res, pronosticosRes] = await Promise.all([
                !cachedMatches ? fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import').then(r => r.json()) : { matches: cachedMatches },
                cliente.from('pronosticos').select('*')
            ]);
            
            if (!cachedMatches) cachedMatches = res.matches || [];
            const pronosticos = pronosticosRes.data || [];

            status.innerHTML = cachedMatches.map(m => {
                const p = pronosticos.find(x => x.partido_id == m.id && x.nombre_usuario === u);
                
                return `<div class="flex items-center justify-between border-b py-2 gap-2">
                    <span class="w-1/2 text-xs truncate">${m.homeTeam?.name} vs ${m.awayTeam?.name}</span>
                    <input type="number" id="l-${m.id}" value="${p?.pronostico_local ?? ''}" class="w-10 border text-center rounded">
                    <input type="number" id="v-${m.id}" value="${p?.pronostico_visitante ?? ''}" class="w-10 border text-center rounded">
                    <button onclick="guardar('${m.id}', event)" class="bg-green-600 text-white px-2 py-1 rounded text-xs">OK</button>
                </div>`;
            }).join('');

            let scores = {};
            cachedMatches.forEach(m => {
                if (m.status === 'FINISHED') {
                    pronosticos.filter(x => x.partido_id == m.id).forEach(p => {
                        if (!scores[p.nombre_usuario]) scores[p.nombre_usuario] = 0;
                        const rL = m.score?.fullTime?.home, rV = m.score?.fullTime?.away;
                        const pL = parseInt(p.pronostico_local), pV = parseInt(p.pronostico_visitante);
                        if (!isNaN(pL)) {
                            if (pL === rL && pV === rV) scores[p.nombre_usuario] += 3;
                            else if ((pL > pV && rL > rV) || (pL < pV && rL < rV) || (pL === pV && rL === rV)) scores[p.nombre_usuario] += 1;
                        }
                    });
                }
            });

            document.getElementById('tablaContenido').innerHTML = Object.entries(scores)
                .sort((a,b) => b[1]-a[1])
                .map(([n, s], i) => {
                    const medalla = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
                    return `<div class="flex justify-between p-1 border-b text-xs ${n === u ? 'bg-blue-200 font-bold' : ''}">
                        <span>${medalla} ${i+1}. ${n}</span><span>${s} pts</span>
                    </div>`;
                }).join('');
        }

        async function guardar(id, event) {
            const u = document.getElementById('userSelector').value;
            const l = document.getElementById('l-'+id).value;
            const v = document.getElementById('v-'+id).value;
            const btn = event.target;

            if (l === "" || v === "") return alert("Debes llenar ambos marcadores");

            btn.innerText = "⏳";
            
            // Usamos UPSERT con el nombre y el ID. Asegúrate que en Supabase esto tenga el UNIQUE INDEX que vimos antes.
            const { error } = await cliente.from('pronosticos').upsert({ 
                nombre_usuario: u, 
                partido_id: String(id), 
                pronostico_local: parseInt(l), 
                pronostico_visitante: parseInt(v) 
            }, { onConflict: 'nombre_usuario, partido_id' });

            if (error) {
                console.error("Error:", error);
                alert("Error: " + error.message);
                btn.innerText = "OK";
            } else {
                btn.innerText = "✓";
                setTimeout(() => { btn.innerText = "OK"; cargarTodo(); }, 500);
            }
        }
        init();
    </script>
</body>
</html>
