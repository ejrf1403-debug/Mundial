<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-xl font-bold mb-4">Sincronización de Datos</h1>
        <button id="btnSync" class="w-full bg-green-600 text-white p-4 rounded-lg font-bold">
            🚀 Sincronizar desde Servidor
        </button>
        <p id="status" class="mt-4 text-center font-mono text-sm text-slate-600"></p>
    </div>

    <script>
        const clienteSupabase = supabase.createClient(
            "https://vaayxjpzwhesukyzmnez.supabase.co", 
            "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm"
        );

        async function sincronizarPartidos() {
            const status = document.getElementById('status');
            status.innerText = "⏳ Probando conexión con API...";

            try {
                // Usamos la lista de competiciones generales (endpoint gratuito)
                const res = await fetch('https://api.football-data.org/v4/competitions', {
                    headers: { 'X-Auth-Token': '8bd17a06ad9c42b8940faa3869f2ed55' }
                });

                if (!res.ok) throw new Error("Error " + res.status + ": Acceso denegado o endpoint no encontrado.");
                
                const data = await res.json();
                status.innerText = "✅ ¡Conectado! Verificando ligas...";
                console.log("Datos recibidos:", data);

                // Si llegamos aquí, la conexión funciona. 
                // Ahora intentamos insertar algo básico para probar la base de datos
                const { error } = await clienteSupabase.from('partidos').insert([
                    { equipo_local: 'Test Local', equipo_visitante: 'Test Visitante', goles_local: 0, goles_visitante: 0 }
                ]);

                if (error) throw new Error("Error en Supabase: " + error.message);
                
                status.innerText = "¡Prueba exitosa! Conexión verificada.";

            } catch (e) {
                status.innerText = "❌ Error: " + e.message;
            }
        }

        document.getElementById('btnSync').addEventListener('click', sincronizarPartidos);
    </script>
</body>
</html>
