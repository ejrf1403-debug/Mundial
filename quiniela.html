<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela 2026 - Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4">
    <div id="debug" class="text-red-600 font-bold mb-4"></div>
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow">
                <h1 class="text-xl font-bold mb-4 text-center">🏆 Quiniela 2026</h1>
                <select id="userSelector" class="w-full p-3 border rounded-lg mb-4 font-bold text-red-600 bg-red-50">
                    <option value="">Selecciona un participante...</option>
                </select>
                <button id="btnLoad" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Cargar Partidos</button>
                <div id="status" class="mt-4 space-y-1"></div>
            </div>
        </div>
        <div class="md:col-span-1">
            <div class="bg-white p-6 rounded-xl shadow sticky top-6 max-h-[80vh] flex flex-col">
                <h2 class="text-xl font-bold mb-4 text-center">📊 Tabla</h2>
                <div id="leaderboard" class="space-y-2 text-sm overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

    <script>
        const debug = document.getElementById('debug');
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        async function init() {
            try {
                const { data, error } = await cliente.from('usuarios').select('nombre');
                if (error) throw error;
                const sel = document.getElementById('userSelector');
                data?.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
                
                const userParam = new URLSearchParams(window.location.search).get('usuario');
                if (userParam) { sel.value = userParam; cargarTodo(); }
            } catch (e) { debug.innerHTML = "Error cargando usuarios: " + e.message; }
        }

        async function cargarTodo() {
            const status = document.getElementById('status');
            const lb = document.getElementById('leaderboard');
            const nombre = document.getElementById('userSelector').value;
            if (!nombre) return;
            
            status.innerHTML = "Obteniendo datos...";
            try {
                const response = await fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import');
                if (!response.ok) throw new Error("Error en API de partidos");
                const dataPartidos = await response.json();
                
                const { data: pronosticos, error } = await cliente.from('pronosticos').select('*');
                if (error) throw error;

                status.innerHTML = "Procesando...";
                // ... (aquí iría tu lógica de renderizado) ...
                status.innerHTML = "¡Carga completa! (Revisa tu consola si no ves nada)";
                console.log("Datos recibidos:", dataPartidos, pronosticos);
            } catch (e) {
                status.innerHTML = "❌ Error: " + e.message;
            }
        }

        document.getElementById('btnLoad').onclick = cargarTodo;
        init();
    </script>
</body>
</html>
