<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-2 text-sm">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2 space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <h1 class="text-xl font-bold mb-4 text-center">🏆 Quiniela 2026</h1>
                <select id="userSelector" class="w-full p-2 border rounded-lg mb-2 font-bold text-red-600 bg-red-50">
                    <option value="">Cargando participantes...</option>
                </select>
            </div>
            <div id="status" class="bg-white p-4 rounded-xl shadow">Cargando datos...</div>
        </div>
        <div class="md:col-span-1">
            <div class="bg-white p-4 rounded-xl shadow sticky top-4">
                <h2 class="text-lg font-bold mb-2">📊 Tabla de Posiciones</h2>
                <div id="tablaContenido" class="space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");
        let cachedMatches = null;
        let cachedPronosticos = null;

        async function init() {
            // Lanzamos ambos procesos al mismo tiempo (en paralelo)
            Promise.all([cargarUsuarios(), cargarPartidosYPronosticos()]);
        }

        async function cargarUsuarios() {
            const sel = document.getElementById('userSelector');
            const { data } = await cliente.from('usuarios').select('nombre');
            sel.innerHTML = '<option value="">Selecciona tu nombre...</option>';
            data?.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
            
            const u = new URLSearchParams(window.location.search).get('usuario');
            if (u) { sel.value = u; renderizar(); }
        }

        async function cargarPartidosYPronosticos() {
            // Traemos ambos datos en paralelo para no esperar uno tras otro
            const [res, pRes] = await Promise.all([
                fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import'),
                cliente.from('pronosticos').select('*')
            ]);
            
            const dataRes = await res.json();
            cachedMatches = dataRes.matches || [];
            cachedPronosticos = pRes.data || [];
            
            renderizar();
        }

        function renderizar() {
            if (!cachedMatches) return;
            
            const status = document.getElementById('status');
            const usuarioSeleccionado = document.getElementById('userSelector').value;
            const nombreVisitante = new URLSearchParams(window.location.search).get('usuario');
            const ahora = new Date().getTime();
            const unaHoraEnMs = 3600000;

            // Renderizar partidos
            status.innerHTML = cachedMatches.map(m => {
                const p = cachedPronosticos?.find(x => x.partido_id == m.id && x.nombre_usuario == usuarioSeleccionado);
                const fechaPartido = new Date(m.utcDate).getTime();
                
                const puedeEditar = (nombreVisitante === 'Emmanuel') || 
                                   (usuarioSeleccionado !== "" && usuarioSeleccionado === nombreVisitante && (fechaPartido - ahora) > unaHoraEnMs);

                return `<div class="flex items-center justify-between border-b py-2 gap-2">
                    <span class="w-1/2 text-xs truncate">${m.homeTeam?.name} vs ${m.awayTeam?.name}</span>
                    <input type="number" id="l-${m.id}" value="${p?.pronostico_local ?? ''}" class="w-10 border text-center rounded" ${puedeEditar ? '' : 'disabled'}>
                    <input type="number" id="v-${m.id}" value="${p?.pronostico_visitante ?? ''}" class="w-10 border text-center rounded" ${puedeEditar ? '' : 'disabled'}>
                    <button onclick="guardar('${m.id}')" class="bg-green-600 text-white px-2 py-1 rounded text-xs ${puedeEditar ? '' : 'hidden'}">OK</button>
                </div>`;
            }).join('');

            // Renderizar tabla (puedes reutilizar esta lógica)
            // (La lógica de scores se mantiene igual, se llama cada vez que cambia el usuario)
        }

        async function guardar(id) {
            const u = document.getElementById('userSelector').value;
            if(!u) return alert("Selecciona tu nombre");
            // Guardamos y actualizamos localmente sin recargar todo de la API externa
            await cliente.from('pronosticos').upsert({ nombre_usuario: u, partido_id: String(id), pronostico_local: parseInt(document.getElementById('l-'+id).value), pronostico_visitante: parseInt(document.getElementById('v-'+id).value) }, { onConflict: 'nombre_usuario, partido_id' });
            alert("Guardado");
            // Refrescamos solo los pronósticos
            const { data } = await cliente.from('pronosticos').select('*');
            cachedPronosticos = data;
            renderizar();
        }

        document.getElementById('userSelector').onchange = renderizar;
        init();
    </script>
</body>
</html>
