<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow">
                <h1 class="text-xl font-bold mb-4 text-center">🏆 Quiniela 2026</h1>
                <label class="block text-sm font-bold mb-1">Tu usuario:</label>
                <select id="userSelector" class="w-full p-3 border rounded-lg mb-4 font-bold text-red-600 bg-red-50">
                    <option value="">Cargando...</option>
                </select>
                <button id="btnLoad" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Cargar Partidos</button>
                <div id="status" class="mt-4 text-sm max-h-[60vh] overflow-y-auto"></div>
            </div>
        </div>

        <div class="md:col-span-1">
            <div class="bg-white p-6 rounded-xl shadow sticky top-6">
                <h2 class="text-xl font-bold mb-4 text-center">📊 Tabla de Posiciones</h2>
                <div id="leaderboard" class="space-y-2 text-sm text-gray-500">Haz clic en "Cargar Partidos" para ver la tabla.</div>
            </div>
        </div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const userParam = urlParams.get('usuario');
            const sel = document.getElementById('userSelector');

            if (userParam) {
                sel.innerHTML = `<option value="${userParam}">${userParam}</option>`;
                sel.disabled = true;
                // Si entra por link, cargamos partidos automáticamente
                document.getElementById('btnLoad').click();
            } else {
                try {
                    const { data } = await cliente.from('usuarios').select('nombre');
                    sel.innerHTML = '<option value="">Selecciona un participante...</option>';
                    data?.forEach(u => {
                        let opt = document.createElement('option');
                        opt.value = u.nombre;
                        opt.textContent = u.nombre;
                        sel.appendChild(opt);
                    });
                    sel.onchange = () => document.getElementById('btnLoad').click();
                } catch (e) { sel.innerHTML = '<option value="">Error al cargar</option>'; }
            }
        }

        async function cargarPronosticos() {
            const nombre = document.getElementById('userSelector').value;
            if (!nombre) return;
            const { data } = await cliente.from('pronosticos').select('*').eq('nombre_usuario', nombre);
            data?.forEach(p => {
                const iL = document.getElementById(`l-${p.partido_id}`);
                const iV = document.getElementById(`v-${p.partido_id}`);
                if(iL) iL.value = p.pronostico_local;
                if(iV) iV.value = p.pronostico_visitante;
            });
        }

        async function guardarPronostico(pId, iL, iV) {
            const nombre = document.getElementById('userSelector').value;
            if (!nombre) return;
            await cliente.from('pronosticos').upsert({
                nombre_usuario: nombre,
                partido_id: String(pId),
                pronostico_local: parseInt(iL.value) || 0,
                pronostico_visitante: parseInt(iV.value) || 0
            }, { onConflict: 'nombre_usuario, partido_id' });
            alert("✅ Guardado");
            calcularPosiciones();
        }

        async function calcularPosiciones() {
            const lb = document.getElementById('leaderboard');
            try {
                const res = await fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import');
                const dataRes = await res.json();
                const { data: pronosticos } = await cliente.from('pronosticos').select('*');
                let scores = {};
                pronosticos?.forEach(p => {
                    const partidoReal = dataRes.matches.find(m => m.id == p.partido_id);
                    if (partidoReal?.status === 'FINISHED') {
                        if (!scores[p.nombre_usuario]) scores[p.nombre_usuario] = 0;
                        const rL = partidoReal.score.fullTime.home;
                        const rV = partidoReal.score.fullTime.away;
                        if (p.pronostico_local === rL && p.pronostico_visitante === rV) scores[p.nombre_usuario] += 3;
                        else if ((p.pronostico_local > p.pronostico_visitante && rL > rV) || 
                                 (p.pronostico_local < p.pronostico_visitante && rL < rV) ||
                                 (p.pronostico_local === p.pronostico_visitante && rL === rV)) scores[p.nombre_usuario] += 1;
                    }
                });
                lb.innerHTML = Object.entries(scores).sort((a,b) => b[1] - a[1])
                    .map(([n, p]) => `<div
