<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2">
            <select id="userSelector" class="w-full p-3 border rounded-lg mb-4 font-bold text-lg text-blue-600 bg-white shadow">
                <option value="">Selecciona tu nombre...</option>
            </select>
            <div id="partidos" class="bg-white p-4 rounded-xl shadow space-y-2">Cargando partidos...</div>
        </div>
        <div id="tabla" class="bg-white p-4 rounded-xl shadow h-fit">
            <h2 class="font-bold mb-4 border-b pb-2">📊 Tabla de Posiciones</h2>
            <div id="tablaContenido" class="space-y-1"></div>
        </div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");
        let matches = [];

        async function init() {
            const { data } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            // Quitamos duplicados visuales
            const unicos = [...new Set(data.map(u => u.nombre.trim()))];
            unicos.forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
            
            const params = new URLSearchParams(window.location.search);
            if (params.has('u')) { sel.value = params.get('u'); cargarTodo(); }
            sel.onchange = () => { cargarTodo(); };
        }

        async function cargarTodo() {
            const u = document.getElementById('userSelector').value;
            if(!u) return;

            const [res, pRes] = await Promise.all([
                fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import').then(r => r.json()),
                cliente.from('pronosticos').select('*')
            ]);
            
            matches = res.matches;
            const pronosticos = pRes.data;

            document.getElementById('partidos').innerHTML = matches.map(m => {
                const p = pronosticos.find(x => x.partido_id == m.id && x.nombre_usuario === u);
                let color = "";
                if(m.status === 'FINISHED' && p) {
                    const rL = m.score?.fullTime?.home, rV = m.score?.fullTime?.away;
                    const pL = p.pronostico_local, pV = p.pronostico_visitante;
                    color = (pL === rL && pV === rV) ? 'bg-green-300' : 
                            ((pL > pV && rL > rV) || (pL < pV && rL < rV) || (pL === pV && rL === rV)) ? 'bg-yellow-300' : 'bg-red-300';
                }

                return `<div class="flex items-center gap-2 p-2 border-b">
                    <span class="text-xs w-1/2 truncate">${m.homeTeam?.name} vs ${m.awayTeam?.name}</span>
                    <input type="number" id="l-${m.id}" value="${p?.pronostico_local ?? 0}" class="w-12 border text-center rounded ${color}">
                    <input type="number" id="v-${m.id}" value="${p?.pronostico_visitante ?? 0}" class="w-12 border text-center rounded ${color}">
                    <button onclick="guardar('${m.id}')" class="bg-blue-500 text-white px-2 py-1 rounded text-xs hover:bg-blue-600">OK</button>
                </div>`;
            }).join('');

            // Cálculo tabla
            let scores = {};
            matches.forEach(m => {
                if(m.status === 'FINISHED') {
                    pronosticos.forEach(p => {
                        if(p.partido_id == m.id) {
                            if(!scores[p.nombre_usuario]) scores[p.nombre_usuario] = 0;
                            const rL = m.score?.fullTime?.home, rV = m.score?.fullTime?.away;
                            if (p.pronostico_local === rL && p.pronostico_visitante === rV) scores[p.nombre_usuario] += 3;
                            else if ((p.pronostico_local > p.pronostico_visitante && rL > rV) || (p.pronostico_local < p.pronostico_visitante && rL < rV) || (p.pronostico_local === p.pronostico_visitante && rL === rV)) scores[p.nombre_usuario] += 1;
                        }
                    });
                }
            });

            document.getElementById('tablaContenido').innerHTML = Object.entries(scores)
                .sort((a,b) => b[1]-a[1])
                .map(([n, s], i) => {
                    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
                    return `<div class="flex justify-between p-1 border-b text-sm ${n===u ? 'bg-blue-100 font-bold' : ''}">
                        <span>${medal} ${i+1}. ${n}</span> <span>${s} pts</span>
                    </div>`;
                }).join('');
        }

        async function guardar(id) {
            const u = document.getElementById('userSelector').value;
            const l = parseInt(document.getElementById('l-'+id).value);
            const v = parseInt(document.getElementById('v-'+id).value);
            
            // BUSCAR SI EXISTE ANTES DE INSERTAR (Soluciona el problema de "no guarda")
            const { data: ex } = await cliente.from('pronosticos').select('id').eq('nombre_usuario', u).eq('partido_id', String(id)).single();
            
            let res;
            if (ex) {
                res = await cliente.from('pronosticos').update({ pronostico_local: l, pronostico_visitante: v }).eq('id', ex.id);
            } else {
                res = await cliente.from('pronosticos').insert({ nombre_usuario: u, partido_id: String(id), pronostico_local: l, pronostico_visitante: v });
            }

            if (res.error) alert("Error: " + res.error.message);
            else cargarTodo();
        }
        init();
    </script>
</body>
</html>
