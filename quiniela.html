<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-2 text-sm">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2 space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <h1 class="text-xl font-bold mb-4 text-center">🏆 Quiniela 2026</h1>
                <select id="userSelector" class="w-full p-2 border rounded-lg mb-2 font-bold text-red-600 bg-red-50">
                    <option value="">Selecciona un participante...</option>
                </select>
                <button id="btnLoad" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Ver Partidos</button>
            </div>
            <div id="status" class="bg-white p-4 rounded-xl shadow">Selecciona un usuario para empezar.</div>
        </div>

        <div class="md:col-span-1">
            <div class="bg-white p-4 rounded-xl shadow sticky top-4">
                <h2 class="text-lg font-bold mb-2">📊 Tabla</h2>
                <div id="tablaContenido" class="space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        async function init() {
            const { data } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            data?.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
        }

        document.getElementById('btnLoad').onclick = async () => {
            const status = document.getElementById('status');
            const tablaContenido = document.getElementById('tablaContenido');
            const usuarioSeleccionado = document.getElementById('userSelector').value;
            const nombreVisitante = new URLSearchParams(window.location.search).get('usuario');
            
            if (!usuarioSeleccionado) { alert("Selecciona un nombre"); return; }
            
            status.innerHTML = "Cargando...";
            const [res, pronosticosData] = await Promise.all([
                fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import'),
                cliente.from('pronosticos').select('*')
            ]);
            
            const dataPartidos = await res.json();
            const pronosticos = pronosticosData.data;
            const ahora = Date.now();

            // 1. RENDER PARTIDOS
            status.innerHTML = dataPartidos.matches.map(m => {
                const p = pronosticos?.find(x => x.partido_id == m.id && x.nombre_usuario == usuarioSeleccionado);
                const fecha = new Date(m.utcDate).getTime();
                const puedeEditar = (nombreVisitante === 'Emmanuel' || (usuarioSeleccionado === nombreVisitante && ahora < fecha));
                
                let color = '';
                if (m.status === 'FINISHED' && p) {
                    const rL = m.score?.fullTime?.home, rV = m.score?.fullTime?.away;
                    const pL = parseInt(p.pronostico_local), pV = parseInt(p.pronostico_visitante);
                    if (pL === rL && pV === rV) color = 'bg-green-300';
                    else if ((pL > pV && rL > rV) || (pL < pV && rL < rV) || (pL === pV && rL === rV)) color = 'bg-yellow-300';
                    else color = 'bg-red-300';
                }

                return `<div class="flex items-center justify-between border-b py-2 gap-2">
                    <span class="w-1/2 text-xs font-medium truncate">${m.homeTeam?.name || 'Local'} vs ${m.awayTeam?.name || 'Visita'}</span>
                    <input type="number" id="l-${m.id}" value="${p?.pronostico_local ?? ''}" class="w-10 border text-center rounded ${color}" ${puedeEditar ? '' : 'disabled'}>
                    <input type="number" id="v-${m.id}" value="${p?.pronostico_visitante ?? ''}" class="w-10 border text-center rounded ${color}" ${puedeEditar ? '' : 'disabled'}>
                    <button onclick="guardar('${m.id}')" class="bg-green-600 text-white px-2 py-1 rounded text-xs ${puedeEditar ? '' : 'hidden'}">OK</button>
                </div>`;
            }).join('');

            // 2. RENDER TABLA DE POSICIONES
            let scores = {};
            pronosticos?.forEach(p => {
                const m = dataPartidos.matches.find(x => x.id == p.partido_id);
                if (m?.status === 'FINISHED') {
                    if (!scores[p.nombre_usuario]) scores[p.nombre_usuario] = 0;
                    const rL = m.score?.fullTime?.home, rV = m.score?.fullTime?.away;
                    const pL = parseInt(p.pronostico_local), pV = parseInt(p.pronostico_visitante);
                    if (!isNaN(pL) && pL === rL && pV === rV) scores[p.nombre_usuario] += 3;
                    else if (!isNaN(pL) && ((pL > pV && rL > rV) || (pL < pV && rL < rV) || (pL === pV && rL === rV))) scores[p.nombre_usuario] += 1;
                }
            });
            tablaContenido.innerHTML = Object.entries(scores).sort((a,b) => b[1]-a[1]).map(([n, s], i) => 
                `<div class="flex justify-between p-1 border-b text-xs ${i<3 ? 'font-bold':''}">
                    <span>${i+1}. ${n}</span><span>${s} pts</span>
                </div>`).join('');
        };

        async function guardar(id) {
            const usuarioSeleccionado = document.getElementById('userSelector').value;
            const res = await cliente.from('pronosticos').upsert({
                nombre_usuario: usuarioSeleccionado, partido_id: String(id),
                pronostico_local: parseInt(document.getElementById('l-'+id).value),
                pronostico_visitante: parseInt(document.getElementById('v-'+id).value)
            }, { onConflict: 'nombre_usuario, partido_id' });
            
            if (res.error) alert("Error: " + res.error.message);
            else { alert("Guardado"); document.getElementById('btnLoad').click(); }
        }
        init();
    </script>
</body>
</html>
