<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-2xl font-bold text-center mb-6">🏆 Quiniela Mundial</h1>
        
        <select id="userSelector" class="w-full p-3 border rounded-lg mb-6 font-bold text-blue-700">
            <option value="">Selecciona tu nombre...</option>
        </select>
        
        <button id="btnLoad" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Cargar Partidos</button>
        <div id="status" class="mt-8"></div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        // Cargar usuarios al inicio
        async function init() {
            const { data } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            data.forEach(u => {
                sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`;
            });
        }

        async function guardarPronostico(partidoId, horaPartido, inputL, inputV) {
            const nombre = document.getElementById('userSelector').value;
            if (!nombre) { alert("¡Selecciona tu nombre primero!"); return; }

            const diff = (new Date(horaPartido) - new Date()) / 1000 / 60;
            if (diff <= 30) { alert("🚫 Bloqueado: Ya pasaron los 30 min previos al juego."); return; }

            const { error } = await cliente.from('pronosticos').upsert({
                nombre_usuario: nombre,
                partido_id: partidoId,
                pronostico_local: parseInt(inputL.value),
                pronostico_visitante: parseInt(inputV.value)
            }, { onConflict: 'nombre_usuario, partido_id' });

            error ? alert("Error: " + error.message) : alert("✅ Pronóstico guardado!");
        }

        document.getElementById('btnLoad').addEventListener('click', async () => {
            const res = await fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import');
            const data = await res.json();
            let html = '<div class="space-y-4">';
            data.matches.forEach(m => {
                html += `
                    <div class="border p-3 rounded flex flex-col gap-2">
                        <span class="text-xs text-gray-500">${new Date(m.utcDate).toLocaleString()}</span>
                        <div class="flex justify-between items-center">
                            <span>${m.homeTeam.name} vs ${m.awayTeam.name}</span>
                            <div class="flex gap-2">
                                <input type="number" id="l-${m.id}" class="w-12 border p-1" placeholder="0">
                                <input type="number" id="v-${m.id}" class="w-12 border p-1" placeholder="0">
                                <button onclick="guardarPronostico('${m.id}', '${m.utcDate}', document.getElementById('l-${m.id}'), document.getElementById('v-${m.id}'))" 
                                class="bg-green-600 text-white px-2 py-1 rounded text-xs">Guardar</button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('status').innerHTML = html + '</div>';
        });

        init();
    </script>
</body>
</html>
