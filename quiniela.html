<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-2">
    <div class="max-w-md mx-auto bg-white p-4 rounded-xl shadow">
        <h1 class="text-lg font-bold mb-4 text-center">🏆 Quiniela 2026</h1>
        <select id="userSelector" class="w-full p-2 border rounded-lg mb-4 font-bold text-red-600 bg-red-50">
            <option value="">Selecciona un participante...</option>
        </select>
        <button id="btnLoad" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Cargar Partidos</button>
        <div id="status" class="mt-4 text-sm text-center font-bold"></div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        async function init() {
            try {
                const { data } = await cliente.from('usuarios').select('nombre');
                const sel = document.getElementById('userSelector');
                data?.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
            } catch (e) { document.getElementById('status').innerText = "Error cargando usuarios"; }
        }

        document.getElementById('btnLoad').onclick = async () => {
            const status = document.getElementById('status');
            const nombre = document.getElementById('userSelector').value;
            if (!nombre) { alert("Selecciona un usuario"); return; }
            
            status.innerText = "Conectando con API...";
            try {
                const res = await fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import');
                if (!res.ok) throw new Error(`API Error: ${res.status}`);
                const data = await res.json();
                status.innerText = "Datos cargados: " + (data.matches?.length || 0) + " partidos.";
                console.log(data);
            } catch (err) {
                status.innerText = "Error: " + err.message;
                console.error(err);
            }
        };
        init();
    </script>
</body>
</html>
