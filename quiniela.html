<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-2 text-sm">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2 space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <h1 class="text-xl font-bold mb-4 text-center">🏆 Quiniela 2026</h1>
                <select id="userSelector" class="w-full p-2 border rounded-lg mb-2 font-bold text-red-600 bg-red-50">
                    <option value="">Cargando usuarios...</option>
                </select>
            </div>
            <div id="status" class="bg-white p-4 rounded-xl shadow">Esperando selección...</div>
        </div>
        <div class="md:grid-cols-1">
            <div class="bg-white p-4 rounded-xl shadow sticky top-4">
                <h2 class="text-lg font-bold mb-2">📊 Tabla de Posiciones</h2>
                <div id="tablaContenido" class="space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");
        let cachedMatches = null;

        async function init() {
            const sel = document.getElementById('userSelector');
            
            // 1. CARGA DE USUARIOS INDEPENDIENTE
            try {
                const { data, error } = await cliente.from('usuarios').select('nombre');
                if (error) throw error;

                sel.innerHTML = '<option value="">Selecciona tu nombre...</option>';
                data?.forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u.nombre;
                    opt.textContent = u.nombre;
                    sel.appendChild(opt);
                });
                
                const u = new URLSearchParams(window.location.search).get('usuario');
                if (u) { sel.value = u; cargarTodo(); }
                
                sel.onchange = cargarTodo;
            } catch (err) {
                console.error("Error cargando usuarios:", err);
                sel.innerHTML = '<option value="">Error al cargar usuarios</option>';
            }
        }

        async function cargarTodo() {
            const status = document.getElementById('status');
            const usuarioSeleccionado = document.getElementById('userSelector').value;
            if(!usuarioSeleccionado) return;

            status.innerHTML = "Cargando partidos...";

            try {
                const [resData, pData] = await Promise.all([
                    !cachedMatches ? fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import').then(r => r.json()) : { matches: cachedMatches },
                    cliente.from('pronosticos').select('*')
                ]);
                
                if (!cachedMatches) cachedMatches = resData.matches || [];
                const pronosticos = pData.data || [];
                
                status.innerHTML = cachedMatches.map(m => {
                    const p = pronosticos.find(x => x.partido_id == m.id && x.nombre_usuario?.toLowerCase() === usuarioSeleccionado.toLowerCase());
                    
                    return `<div class="flex items-center justify-between border-b py-2 gap-2">
                        <span class="w-1/2 text-xs truncate">${m.homeTeam?.name} vs ${m.awayTeam?.name}</span>
                        <input type="number" id="l-${m.id}" value="${p?.pronostico_local ?? ''}" class="w-10 border text-center rounded">
                        <input type="number" id="v-${m.id}" value="${p?.pronostico_visitante ?? ''}" class="w-10 border text-center rounded">
                        <button onclick="guardar('${m.id}', event)" class="bg-green-600 text-white px-2 py-1 rounded text-xs">OK</button>
                    </div>`;
                }).join('');
            } catch (e) {
                status.innerHTML = "Error al conectar con la base de datos.";
            }
        }

        async function guardar(id, event) {
            const u = document.getElementById('userSelector').value;
            const btn = event.target;
            btn.innerText = "...";
            
            const { error } = await cliente.from('pronosticos').upsert({ 
                nombre_usuario: u, 
                partido_id: String(id), 
                pronostico_local: parseInt(document.getElementById('l-'+id).value), 
                pronostico_visitante: parseInt(document.getElementById('v-'+id).value) 
            }, { onConflict: 'nombre_usuario, partido_id' });

            if (error) { alert("Error: " + error.message); btn.innerText = "OK"; }
            else { btn.innerText = "✓"; setTimeout(() => { btn.innerText = "OK"; }, 1000); }
        }

        init();
    </script>
</body>
</html>
