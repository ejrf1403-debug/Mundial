<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-2 text-sm">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2 space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <h1 class="text-xl font-bold mb-4 text-center">🏆 Quiniela 2026</h1>
                <select id="userSelector" class="w-full p-2 border rounded-lg mb-2 font-bold text-red-600 bg-red-50">
                    <option value="">Selecciona tu nombre...</option>
                </select>
            </div>
            <div id="status" class="bg-white p-4 rounded-xl shadow">Cargando datos...</div>
        </div>
        <div class="md:grid-cols-1">
            <div class="bg-white p-4 rounded-xl shadow sticky top-4">
                <h2 class="text-lg font-bold mb-2">📊 Tabla de Posiciones</h2>
                <div id="tablaContenido" class="space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");
        let cachedMatches = null;

        async function init() {
            const sel = document.getElementById('userSelector');
            const { data } = await cliente.from('usuarios').select('nombre');
            data?.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
            
            const u = new URLSearchParams(window.location.search).get('usuario');
            if (u) { sel.value = u; }
            
            cargarTodo();
            sel.onchange = cargarTodo;
        }

        async function cargarTodo() {
            const status = document.getElementById('status');
            const usuarioSeleccionado = document.getElementById('userSelector').value;
            const nombreVisitante = new URLSearchParams(window.location.search).get('usuario');

            if (!cachedMatches) status.innerHTML = "Cargando partidos...";

            const [resData, pData] = await Promise.all([
                !cachedMatches ? fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import').then(r => r.json()) : { matches: cachedMatches },
                cliente.from('pronosticos').select('*')
            ]);
            
            if (!cachedMatches) cachedMatches = resData.matches || [];
            const pronosticos = pData.data || [];
            const ahora = new Date().getTime();
            const unaHoraEnMs = 3600000;

            status.innerHTML = cachedMatches.map(m => {
                // CORRECCIÓN: Búsqueda flexible (ignora mayúsculas/espacios)
                const p = pronosticos.find(x => 
                    x.partido_id == m.id && 
                    x.nombre_usuario?.trim().toLowerCase() === usuarioSeleccionado?.trim().toLowerCase()
                );
                
                const fechaPartido = new Date(m.utcDate).getTime();
                
                const esAdmin = (nombreVisitante === 'Emmanuel');
                const faltaMasDeUnaHora = (fechaPartido - ahora) > unaHoraEnMs;
                const esMiPronostico = (usuarioSeleccionado !== "" && usuarioSeleccionado === nombreVisitante);
                const puedeEditar = esAdmin || (esMiPronostico && faltaMasDeUnaHora);

                let color = '';
                if (m.status === 'FINISHED' && p) {
                    const rL = m.score?.fullTime?.home, rV = m.score?.fullTime?.away;
                    const pL = parseInt(p.pronostico_local), pV = parseInt(p.pronostico_visitante);
                    if (!isNaN(pL)) {
                        if (pL === rL && pV === rV) color = 'bg-green-300';
                        else if ((pL > pV && rL > rV) || (pL < pV && rL < rV) || (pL === pV && rL === rV)) color = 'bg-yellow-300';
                        else color = 'bg-red-300';
                    }
                }

                return `<div class="flex items-center justify-between border-b py-2 gap-2">
                    <span class="w-1/2 text-xs truncate">${m.homeTeam?.name} vs ${m.awayTeam?.name}</span>
                    <input type="number" id="l-${m.id}" value="${p?.pronostico_local ?? ''}" class="w-10 border text-center rounded ${color}" ${puedeEditar ? '' : 'disabled'}>
                    <input type="number" id="v-${m.id}" value="${p?.pronostico_visitante ?? ''}" class="w-10 border text-center rounded ${color}" ${puedeEditar ? '' : 'disabled'}>
                    <button onclick="guardar('${m.id}', event)" class="bg-green-600 text-white px-2 py-1 rounded text-xs ${puedeEditar ? '' : 'hidden'}">OK</button>
                </div>`;
            }).join('');

            let scores = {};
            cachedMatches.forEach(m => {
                if (m.status === 'FINISHED') {
                    pronosticos.filter(x => x.partido_id == m.id).forEach(p => {
                        if (!scores[p.nombre_usuario]) scores[p.nombre_usuario] = 0;
                        const rL = m.score?.fullTime?.home, rV = m.score?.fullTime?.away;
                        const pL = parseInt(p.pronostico_local), pV = parseInt(p.pronostico_visitante);
                        if (!isNaN(pL)) {
                           if (pL === rL && pV === rV) scores[p.nombre_usuario] += 3;
                           else if ((pL > pV && rL > rV) || (pL < pV && rL < rV) || (pL === pV &&
