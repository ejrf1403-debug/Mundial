<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2">
            <select id="userSelector" class="w-full p-4 rounded-xl border mb-4 font-bold text-blue-700 shadow-sm">
                <option value="">Selecciona tu usuario...</option>
            </select>
            <div id="partidos" class="bg-white p-4 rounded-xl shadow border h-[70vh] overflow-y-auto space-y-2"></div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow border h-[80vh] flex flex-col">
            <h2 class="font-black text-xl mb-4 border-b pb-2">📊 Posiciones</h2>
            <div id="tablaContenido" class="overflow-y-auto flex-grow pr-2"></div>
        </div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        async function init() {
            const { data } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            [...new Set(data.map(u => u.nombre.trim()))].sort().forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
            const p = new URLSearchParams(window.location.search);
            if (p.has('u')) { sel.value = p.get('u'); cargarTodo(); }
            sel.onchange = () => cargarTodo();
        }

        async function cargarTodo() {
            const u = document.getElementById('userSelector').value;
            if(!u) return;
            const [res, pRes] = await Promise.all([
                fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import').then(r => r.json()),
                cliente.from('pronosticos').select('*')
            ]);
            
            const matches = res.matches;
            const pronosticos = pRes.data;

            document.getElementById('partidos').innerHTML = matches.map(m => {
                const p = pronosticos.find(x => x.partido_id == m.id && x.nombre_usuario === u);
                let color = "bg-white"; // Default
                if(m.status === 'FINISHED' && p) {
                    const rL = m.score.fullTime.home, rV = m.score.fullTime.away;
                    const pL = p.pronostico_local, pV = p.pronostico_visitante;
                    // Lógica de colores restaurada
                    color = (pL === rL && pV === rV) ? 'bg-green-300' : 
                            ((pL > pV && rL > rV) || (pL < pV && rL < rV) || (pL === pV && rL === rV)) ? 'bg-yellow-300' : 'bg-red-300';
                }

                return `<div class="flex items-center justify-between p-3 border rounded-lg ${color}">
                    <span class="text-xs font-bold w-1/3 truncate">${m.homeTeam?.name} vs ${m.awayTeam?.name}</span>
                    <div class="flex gap-1">
                        <input type="number" id="l-${m.id}" value="${p?.pronostico_local ?? 0}" class="w-10 h-8 border rounded text-center">
                        <input type="number" id="v-${m.id}" value="${p?.pronostico_visitante ?? 0}" class="w-10 h-8 border rounded text-center">
                        <button onclick="guardar('${m.id}')" class="bg-blue-600 text-white px-3 rounded text-xs">OK</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function guardar(id) {
            const u = document.getElementById('userSelector').value;
            const l = parseInt(document.getElementById('l-'+id).value);
            const v = parseInt(document.getElementById('v-'+id).value);
            
            // 1. ELIMINAMOS CUALQUIER PRONÓSTICO PREVIO PARA ESTE PARTIDO Y USUARIO
            await cliente.from('pronosticos').delete().eq('nombre_usuario', u).eq('partido_id', String(id));
            
            // 2. INSERTAMOS EL NUEVO (Esto garantiza que no haya duplicados y se guarde)
            const { error } = await cliente.from('pronosticos').insert({
                nombre_usuario: u,
                partido_id: String(id),
                pronostico_local: l,
                pronostico_visitante: v
            });

            if(error) alert("Error: " + error.message);
            else alert("¡Guardado exitoso!");
        }
        init();
    </script>
</body>
</html>
