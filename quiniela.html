<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administrador de Quiniela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-2xl font-bold text-center mb-6">🛠 Panel de Administración</h1>
        
        <label class="block text-sm font-bold text-gray-700 mb-2">Editar pronósticos de:</label>
        <select id="userSelector" class="w-full p-3 border rounded-lg mb-6 font-bold text-red-600 bg-red-50">
            <option value="">Cargando participantes...</option>
        </select>
        
        <button id="btnLoad" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Cargar Partidos y Pronósticos</button>
        <div id="status" class="mt-8"></div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        // 1. Cargar participantes al iniciar
        async function cargarUsuarios() {
            const { data } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            sel.innerHTML = '<option value="">Selecciona un participante...</option>';
            data.forEach(u => {
                sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`;
            });
        }

        // 2. Guardar pronóstico de cualquier usuario
        async function guardarPronostico(partidoId, inputL, inputV) {
            const nombre = document.getElementById('userSelector').value;
            if (!nombre) { alert("¡Selecciona primero a quién le vas a editar el pronóstico!"); return; }

            const { error } = await cliente.from('pronosticos').upsert({
                nombre_usuario: nombre,
                partido_id: String(partidoId),
                pronostico_local: parseInt(inputL.value) || 0,
                pronostico_visitante: parseInt(inputV.value) || 0
            }, { onConflict: 'nombre_usuario, partido_id' });

            error ? alert("❌ Error: " + error.message) : alert("✅ Actualizado: " + nombre);
        }

        // 3. Cargar partidos
        document.getElementById('btnLoad').addEventListener('click', async () => {
            const res = await fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import');
            const data = await res.json();
            let html = '<div class="space-y-4">';
            
            data.matches.forEach(m => {
                html += `
                    <div class="border p-3 rounded bg-white shadow-sm flex flex-col gap-2">
                        <span class="text-[10px] text-gray-400 uppercase">${m.homeTeam.name} vs ${m.awayTeam.name}</span>
                        <div class="flex items-center gap-2">
                            <input type="number" id="l-${m.id}" class="w-12 border p-1 rounded text-center" placeholder="L">
                            <input type="number" id="v-${m.id}" class="w-12 border p-1 rounded text-center" placeholder="V">
                            <button onclick="guardarPronostico('${m.id}', document.getElementById('l-${m.id}'), document.getElementById('v-${m.id}'))" 
                            class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold w-full">Guardar</button>
                        </div>
                    </div>`;
            });
            document.getElementById('status').innerHTML = html + '</div>';
        });

        cargarUsuarios();
    </script>
</body>
</html>
