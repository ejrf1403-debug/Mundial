<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-xl font-bold mb-4">Mi Quiniela Mundial 2026</h1>
        <button id="btnSync" class="w-full bg-blue-600 text-white p-4 rounded-lg font-bold">
            🔄 Sincronizar Partidos
        </button>
        <p id="status" class="mt-4 text-center font-mono text-sm text-slate-600"></p>
    </div>

    <script>
        const clienteSupabase = supabase.createClient(
            "https://vaayxjpzwhesukyzmnez.supabase.co", 
            "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm"
        );
        
        async function sincronizarPartidos() {
            const status = document.getElementById('status');
            status.innerText = "⏳ Conectando vía proxy...";

            try {
                // Usamos un nuevo proxy que sí acepta dominios externos
                const url = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.football-data.org/v4/competitions/WC/matches');
                
                const response = await fetch(url);
                const dataRaw = await response.json();
                const data = JSON.parse(dataRaw.contents);
                
                status.innerText = "✅ Datos recibidos. Guardando...";

                for (const m of data.matches.slice(0, 5)) {
                    await clienteSupabase.from('partidos').insert([{ 
                        equipo_local: m.homeTeam.name,
                        equipo_visitante: m.awayTeam.name,
                        goles_local: m.score.fullTime.home || 0,
                        goles_visitante: m.score.fullTime.away || 0
                    }]);
                }
                status.innerText = "¡Sincronización completa!";
            } catch (e) {
                status.innerText = "❌ Error: " + e.message;
                console.error("Error completo:", e);
            }
        }
        document.getElementById('btnSync').addEventListener('click', sincronizarPartidos);
    </script>
</body>
</html>
