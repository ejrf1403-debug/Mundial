<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-2 text-sm">
    <div class="max-w-xl mx-auto space-y-4">
        <div class="bg-white p-4 rounded-xl shadow">
            <h1 class="text-xl font-bold mb-4 text-center">🏆 Quiniela 2026</h1>
            <select id="userSelector" class="w-full p-2 border rounded-lg mb-2 font-bold text-red-600 bg-red-50">
                <option value="">Selecciona tu nombre...</option>
            </select>
            <button id="btnLoad" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Ver Partidos</button>
        </div>

        <div id="leaderboard" class="bg-white p-4 rounded-xl shadow">
            <h2 class="text-lg font-bold mb-2">📊 Tabla</h2>
            <div id="tablaContenido" class="space-y-1">Esperando datos...</div>
        </div>

        <div id="status" class="bg-white p-4 rounded-xl shadow space-y-2">Partidos pendientes de carga...</div>
    </div>

    <script>
        const cliente = supabase.createClient("https://vaayxjpzwhesukyzmnez.supabase.co", "sb_publishable_WlvJzS4xplDGVkDkjMB4Nw_M0c1yzXm");

        async function init() {
            const { data } = await cliente.from('usuarios').select('nombre');
            const sel = document.getElementById('userSelector');
            data?.forEach(u => sel.innerHTML += `<option value="${u.nombre}">${u.nombre}</option>`);
        }

        async function cargarTodo() {
            const status = document.getElementById('status');
            const tablaContenido = document.getElementById('tablaContenido');
            const nombre = document.getElementById('userSelector').value;
            if (!nombre) { alert("Selecciona un nombre"); return; }
            
            status.innerHTML = "Cargando...";
            tablaContenido.innerHTML = "Cargando...";
            
            try {
                const [res, pronosticosData] = await Promise.all([
                    fetch('https://vaayxjpzwhesukyzmnez.supabase.co/functions/v1/football-data-import'),
                    cliente.from('pronosticos').select('*')
                ]);
                
                const dataPartidos = await res.json();
                const pronosticos = pronosticosData.data;
                const ahora = Date.now();
                const esEmmanuel = (nombre === 'Emmanuel');

                // Render Partidos
                status.innerHTML = dataPartidos.matches.map(m => {
                    const p = pronosticos?.find(x => x.partido_id == m.id && x.nombre_usuario == nombre);
                    const fecha = new Date(m.utcDate).getTime();
                    const bloqueado = esEmmanuel ? '' : (ahora >= fecha ? 'disabled' : '');
                    const hide = esEmmanuel ? '' : (ahora >= fecha ? 'hidden' : '');

                    return `<div class="flex items-center justify-between border-b py-1 gap-1">
                        <span class="w-1/2 truncate text-xs">${m.homeTeam.name.substring(0,8)} vs ${m.awayTeam.name.substring(0,8)}</span>
                        <input type="number" id="l-${m.id}" value="${p?.pronostico_local ?? ''}" class="w-8 border text-center rounded">
                        <input type="number" id="v-${m.id}" value="${p?.pronostico_visitante ?? ''}" class="w-8 border text-center rounded">
                        <button onclick="guardar('${m.id}')" class="bg-green-600 text-white px-2 py-1 rounded text-xs ${hide}">OK</button>
                    </div>`;
                }).join('');

                // Render Tabla
                let scores = {};
                dataPartidos.matches.forEach(m => {
                    if (m.status === 'FINISHED') {
                        pronosticos?.forEach(p => {
                            if (p.partido_id == m.id) {
                                if (!scores[p.nombre_usuario]) scores[p.nombre_usuario] = 0;
                                const rL = m.score.fullTime.home, rV = m.score.fullTime.away;
                                const pL = parseInt(p.pronostico_local), pV = parseInt(p.pronostico_visitante);
                                if (!isNaN(pL) && pL === rL && pV === rV) scores[p.nombre_usuario] += 3;
                                else if (!isNaN(pL) && ((pL > pV && rL > rV) || (pL < pV && rL < rV) || (pL === pV && rL === rV))) scores[p.nombre_usuario] += 1;
                            }
                        });
                    }
                });
                
                tablaContenido.innerHTML = Object.entries(scores).sort((a,b) => b[1]-a[1]).map(([n, s], i) => 
                    `<div class="flex justify-between p-1 border-b text-xs ${i<3 ? 'font-bold':''}">
                        <span>${i+1}. ${n}</span><span>${s} pts</span>
                    </div>`).join('');
                    
            } catch (e) {
                status.innerHTML = "Error al cargar: " + e.message;
            }
        }

        async function guardar(id) {
            const nombre = document.getElementById('userSelector').value;
            const res = await cliente.from('pronosticos').upsert({
                nombre_usuario: nombre, partido_id: String(id),
                pronostico_local: parseInt(document.getElementById('l-'+id).value),
                pronostico_visitante: parseInt(document.getElementById('v-'+id).value)
            }, { onConflict: 'nombre_usuario, partido_id' });
            if (res.error) alert("Error: " + res.error.message);
            else { alert("Guardado"); cargarTodo(); }
        }

        document.getElementById('btnLoad').onclick = cargarTodo;
        init();
    </script>
</body>
</html>
